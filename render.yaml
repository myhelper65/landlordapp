databases:
  - name: property-db
    databaseName: property_db
    user: postgres
    plan: free
    postgresMajorVersion: 15

services:
  - type: web
    name: property-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_HOST
        fromDatabase:
          name: property-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: property-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: property-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: property-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: property-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "https://landlordapp.vercel.app"
