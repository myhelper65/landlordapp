databases:
  - name: property-db
    databaseName: property_db
    user: postgres
    plan: free
    postgresMajorVersion: 15

services:
  - type: web
    name: property-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: property-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: property-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: property-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-vercel-app-url.vercel.app" # You will update this in the Render dashboard later once Vercel is deployed
